    "/v1/decision-check": {
      "post": {
        "summary": "Additive v6 dual-lane MVR evaluation. Accepts exploratory, evidence_backed, score_direct, compiled_evidence, and backtest modes. score_direct is operator triage only and may return verdict.recommendation=null until evidence is submitted. backtest is historical replay, not a confidence tier, and requires case_id plus backtest_window, baseline_period, or t0_date. Returns public_reality, local_relational_assessment, reconciled_assessment, assembly_summary, provenance_mix, gap_closure_required, market_translation, override_events, crisis_elasticity, and calibration_attestation in audit_metadata. Includes governance_display (dashboard_lines, field_legend) joining scale_recommendation, decision_authorization, and decision_reliability - do not treat scale_recommendation or verdict alone as execution permission. Client guidance: read reconciled_assessment first; verdict.recommendation is retained for backward compatibility.",
